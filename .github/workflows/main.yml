# .github/workflows/main.yml
name: Main Taski workflow

on:
  push:
    branches:
      - main

jobs:
  tests:
    # Разворачиваем окружение:
    runs-on: ubuntu-latest

    steps:
    # Копируем код проекта
    - name: Check out code
      uses: actions/checkout@v3
    # Устанавливаем Python с помощью action
    - name: Set up Python
      uses: actions/setup-python@v4
    # В action setup-python@v4 передаём параметр — версию Python
      with:
        python-version: 3.12
    # Устанавливаем Ruff (линтер + isort, без зависимости от pkg_resources)
    - name: Install Ruff
      run: pip install ruff
    # Запускаем Ruff (проверка и сортировка импортов)
    - name: Lint with Ruff
      run: ruff check backend/ --select I,E,F,W