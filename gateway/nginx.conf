server {
  listen 80;
  server_name myhost.myftp.biz;

  location /api/ {

    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/api/;
  }
  location /admin/ {

    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/admin/;
  }

  location /static/ {
    alias /staticfiles/static/;
  }


  location / {
    root /staticfiles;
    try_files $uri /index.html;
  }
}   
